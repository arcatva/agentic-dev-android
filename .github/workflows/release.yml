# Release APK build. Trigger: push a `v*` tag (creates a GitHub Release with the signed APK)
# or run manually via workflow_dispatch (artifact only).
#
# Signing secrets (repo → Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of release.keystore
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_ALIAS          key alias
#   ANDROID_KEY_PASSWORD       key password
# Without them the build still succeeds but produces an UNSIGNED apk (not installable as an
# upgrade over a signed install) — the job warns loudly in that case.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Don't persist the write-scoped token into git credentials — gradle build logic runs in
      # this job and must not be able to push/mutate the repo. The release-upload action gets
      # the token via its own input, not git credentials.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6

      - name: Prepare signing keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "keystore_file=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
          else
            echo "keystore_file=" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — building an UNSIGNED release APK"
          fi

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ steps.signing.outputs.keystore_file }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Collect APK
        id: apk
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          APK=app/build/outputs/apk/release/app-release.apk
          SUFFIX=""
          if [ ! -f "$APK" ]; then
            APK=app/build/outputs/apk/release/app-release-unsigned.apk
            SUFFIX="-unsigned"
          fi
          [ -f "$APK" ] || { echo "no release APK produced" >&2; exit 1; }
          OUT="agentic-dev-${VERSION}${SUFFIX}.apk"
          cp "$APK" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
