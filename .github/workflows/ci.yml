# CI: compile + JVM unit tests (compiles main sources too, so this is also the compile gate).
name: ci

on:
  push:
    branches: [master]
  pull_request:

# Least privilege: CI only reads the repo. (release.yml keeps its own contents: write.)
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        # testDebugUnitTest covers the Android modules; the pure-JVM inner layers
        # (:core:model, :core:domain — agentic.jvm.library) expose plain `test`.
        run: ./gradlew --no-daemon testDebugUnitTest :core:model:test :core:domain:test
      # Static analysis: fails only on findings NOT in app/detekt-baseline.xml (existing backlog
      # is baselined; shrink it over time).
      - name: detekt
        run: ./gradlew --no-daemon detekt
